<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; form-action 'none'">
<title>KQ Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
  :root {
    --navy: #1B2A6B;
    --gold: #C8960C;
    --gold-light: #D4AF37;
    --gold-bg: #FFF8E7;
    --light-bg: #F4F6FB;
    --white: #FFFFFF;
    --gray: #6B7280;
    --dark: #1a1a2e;
    --green: #2E7D32;
    --red: #C62828;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: var(--dark);
  }

  .app-header {
    text-align: center;
    padding: 40px 20px 20px;
    color: white;
  }
  .app-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, #D4AF37, #FFF8DC, #C8960C);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
  }
  .app-header p {
    color: rgba(255,255,255,0.6);
    margin-top: 8px;
    font-size: 1rem;
    font-weight: 300;
  }

  .tabs {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 20px;
  }
  .tab-btn {
    padding: 12px 32px;
    border-radius: 50px;
    border: 2px solid rgba(212,175,55,0.4);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    border-color: transparent;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(200,150,12,0.4);
  }
  .tab-btn:hover:not(.active) {
    border-color: var(--gold);
    color: white;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.4s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* FORM SECTION */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }
  .form-card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .form-card.full { grid-column: 1 / -1; }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--navy);
    font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--gold-bg);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-title .icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--navy), #2d4a9e);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 0.9rem;
  }

  .field-group {
    display: grid;
    gap: 14px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--navy);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .field input, .field textarea, .field select {
    padding: 10px 14px;
    border: 2px solid #E5E7EB;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    background: white;
    transition: border-color 0.2s;
    outline: none;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,150,12,0.1);
  }
  .field textarea { resize: vertical; min-height: 70px; }

  /* Services Table */
  .services-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
  }
  .services-table th {
    background: var(--navy);
    color: var(--gold-light);
    padding: 10px 14px;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: left;
  }
  .services-table td {
    padding: 8px 8px;
    border-bottom: 1px solid #F3F4F6;
    vertical-align: middle;
  }
  .services-table tr:hover td { background: #FAFAFA; }
  .services-table input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #E5E7EB;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .services-table input:focus { border-color: var(--gold); }
  .remove-row {
    background: none;
    border: none;
    color: #EF4444;
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px 8px;
    border-radius: 6px;
    transition: background 0.2s;
  }
  .remove-row:hover { background: #FEE2E2; }

  .add-row-btn {
    background: none;
    border: 2px dashed var(--gold);
    color: var(--gold);
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    transition: all 0.2s;
    width: 100%;
  }
  .add-row-btn:hover {
    background: var(--gold-bg);
  }

  /* Payment summary inside form */
  .payment-summary-form {
    background: var(--light-bg);
    border-radius: 12px;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 16px;
  }

  .action-btns {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .btn-primary {
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--navy), #2d4a9e);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(27,42,107,0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(27,42,107,0.5);
  }
  .btn-gold {
    padding: 14px 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--navy);
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(200,150,12,0.4);
  }
  .btn-gold:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(200,150,12,0.5);
  }

  /* ============================================
     INVOICE PREVIEW
     ============================================ */
  .preview-wrapper {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .preview-actions {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .preview-actions .title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--navy);
    font-weight: 700;
    margin-right: auto;
  }

  /* The actual invoice design */
  #invoice-preview {
    background: white;
    font-family: 'DM Sans', sans-serif;
    color: #222;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }

  .inv-header {
    background: var(--navy);
    padding: 0;
    display: flex;
    align-items: stretch;
  }
  .inv-logo-box {
    background: white;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 140px;
  }
  .inv-logo-box img {
    width: 110px;
    height: 110px;
    object-fit: contain;
  }
  .inv-company-info {
    padding: 20px 28px;
    flex: 1;
  }
  .inv-company-info h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: white;
    font-weight: 700;
    line-height: 1.2;
  }
  .inv-company-info .tagline {
    color: var(--gold-light);
    font-size: 0.85rem;
    margin-top: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .inv-contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    margin-top: 14px;
  }
  .inv-contact-grid span {
    color: rgba(255,255,255,0.8);
    font-size: 0.78rem;
  }
  .inv-contact-grid span strong {
    color: var(--gold-light);
  }

  .inv-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .inv-from-box {
    background: #F7F8FC;
    padding: 28px 32px;
    border-right: 1px solid #E5E7EB;
  }
  .inv-to-box {
    background: var(--gold-bg);
    padding: 28px 32px;
  }
  .inv-section-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .inv-company-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--navy);
    font-weight: 700;
    margin-bottom: 6px;
  }
  .inv-detail {
    font-size: 0.82rem;
    color: var(--gray);
    line-height: 1.7;
  }
  .inv-invoice-block {
    text-align: right;
  }
  .inv-invoice-block .inv-number {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 8px;
  }
  .inv-badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .badge-partial { background: #FEF3C7; color: #B45309; }
  .badge-paid { background: #D1FAE5; color: var(--green); }
  .badge-unpaid { background: #FEE2E2; color: var(--red); }

  .inv-services {
    padding: 0 0 8px;
  }
  .inv-table {
    width: 100%;
    border-collapse: collapse;
  }
  .inv-table thead tr {
    background: var(--navy);
  }
  .inv-table thead th {
    padding: 12px 20px;
    text-align: left;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold-light);
  }
  .inv-table thead th:last-child { text-align: right; }
  .inv-table tbody tr { border-bottom: 1px solid #F3F4F6; }
  .inv-table tbody tr:nth-child(even) td { background: #FAFBFF; }
  .inv-table tbody td {
    padding: 14px 20px;
    font-size: 0.88rem;
    color: #374151;
    vertical-align: top;
  }
  .inv-table tbody td:first-child {
    font-weight: 700;
    color: var(--navy);
    width: 36px;
  }
  .inv-table tbody td.service-name {
    font-weight: 600;
    color: var(--navy);
  }
  .inv-table tbody td.service-desc {
    color: var(--gray);
    font-size: 0.8rem;
    font-style: italic;
  }
  .inv-table tbody td.amount {
    text-align: right;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .inv-footer-row {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    border-top: 2px solid #E5E7EB;
  }
  .inv-note-box {
    padding: 24px 28px;
    background: var(--gold-bg);
    border-right: 1px solid #E5E7EB;
  }
  .inv-note-box .note-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .inv-note-box p {
    font-size: 0.82rem;
    color: #6B7280;
    line-height: 1.6;
  }
  .inv-payment-box {
    padding: 20px 24px;
  }
  .payment-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #F3F4F6;
    font-size: 0.88rem;
  }
  .payment-row .label { color: var(--gray); }
  .payment-row .value { font-weight: 600; color: var(--dark); }
  .payment-row.received .value { color: var(--green); }
  .payment-row.balance {
    background: var(--navy);
    border-radius: 10px;
    padding: 12px 16px;
    margin-top: 10px;
    border-bottom: none;
  }
  .payment-row.balance .label { color: rgba(255,255,255,0.8); font-weight: 600; }
  .payment-row.balance .value { color: var(--gold-light); font-size: 1.1rem; font-weight: 700; }

  .inv-stamp-footer {
    background: var(--navy);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .inv-stamp-footer span {
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem;
  }
  .inv-stamp-footer strong { color: var(--gold-light); }

  /* Responsive */
  @media (max-width: 768px) {
    .form-grid { grid-template-columns: 1fr; }
    .inv-header { flex-direction: column; }
    .inv-meta { grid-template-columns: 1fr; }
    .inv-footer-row { grid-template-columns: 1fr; }
    .inv-contact-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>⚡ KQ Invoice Generator</h1>
  <p>Professional invoices in seconds — KQ Software Solutions</p>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('form')">📝 Form Bharo</button>
  <button class="tab-btn" onclick="showTab('preview')">👁️ Preview & Download</button>
</div>

<div class="container">

  <!-- FORM SECTION -->
  <div id="section-form" class="section active">
    <div class="form-grid">

      <!-- Invoice Info -->
      <div class="form-card">
        <div class="card-title">
          <div class="icon">📄</div>
          Invoice Details
        </div>
        <div class="field-group">
          <div class="field">
            <label>Invoice Number</label>
            <input type="text" id="inv_number" value="KQ-2026-001" placeholder="KQ-2026-001">
          </div>
          <div class="field">
            <label>Invoice Date</label>
            <input type="date" id="inv_date">
          </div>
          <div class="field">
            <label>Status</label>
            <select id="inv_status">
              <option value="partial">Partially Paid</option>
              <option value="paid">Paid</option>
              <option value="unpaid">Unpaid</option>
            </select>
          </div>
          <div class="field">
            <label>Note (Optional)</label>
            <textarea id="inv_note" placeholder="Thank you for your business...">Thank you for choosing KQ Software Solutions. Please arrange the remaining balance at your earliest convenience.</textarea>
          </div>
        </div>
      </div>

      <!-- Client Details -->
      <div class="form-card">
        <div class="card-title">
          <div class="icon">👤</div>
          Client Details
        </div>
        <div class="field-group">
          <div class="field">
            <label>Client Name</label>
            <input type="text" id="client_name" placeholder="Abdul Ghani Ansari">
          </div>
          <div class="field">
            <label>Client Phone</label>
            <input type="text" id="client_phone" placeholder="+92 300 0000000">
          </div>
          <div class="field">
            <label>Client Email (Optional)</label>
            <input type="email" id="client_email" placeholder="client@email.com">
          </div>
          <div class="field">
            <label>Client Address (Optional)</label>
            <textarea id="client_address" placeholder="City, Pakistan"></textarea>
          </div>
        </div>
      </div>

      <!-- Services -->
      <div class="form-card full">
        <div class="card-title">
          <div class="icon">🛠️</div>
          Services / Items
        </div>
        <table class="services-table">
          <thead>
            <tr>
              <th style="width:40px">#</th>
              <th>Service Name</th>
              <th>Description</th>
              <th style="width:130px">Amount (PKR)</th>
              <th style="width:40px"></th>
            </tr>
          </thead>
          <tbody id="services-body">
            <tr>
              <td style="color:#9CA3AF;font-size:0.85rem;text-align:center">1</td>
              <td><input type="text" placeholder="e.g. AI Content Removal"></td>
              <td><input type="text" placeholder="Short description..."></td>
              <td><input type="number" placeholder="0" style="text-align:right"></td>
              <td><button class="remove-row" onclick="removeRow(this)">✕</button></td>
            </tr>
          </tbody>
        </table>
        <button class="add-row-btn" onclick="addRow()">+ Add Service</button>

        <div class="payment-summary-form">
          <div class="field">
            <label>Total Deal Amount (PKR)</label>
            <input type="number" id="total_deal" placeholder="e.g. 21000">
          </div>
          <div class="field">
            <label>Amount Received (PKR)</label>
            <input type="number" id="amount_received" placeholder="e.g. 10000">
          </div>
        </div>
      </div>

    </div>

    <div class="action-btns">
      <button class="btn-primary" onclick="generatePreview()">👁️ Preview Invoice</button>
    </div>
  </div>

  <!-- PREVIEW SECTION -->
  <div id="section-preview" class="section">
    <div class="preview-wrapper">
      <div class="preview-actions">
        <span class="title">📄 Invoice Preview</span>
        <button class="btn-primary" onclick="showTab('form')" style="padding:10px 24px;font-size:0.88rem;">✏️ Edit</button>
        <button class="btn-gold" onclick="downloadPDF()" style="padding:10px 28px;font-size:0.88rem;">⬇️ Download PDF</button>
      </div>
      <div id="invoice-preview">
        <!-- Generated dynamically -->
      </div>
    </div>
  </div>

</div>

// Set today's date
document.getElementById('inv_date').value = new Date().toISOString().split('T')[0];

let rowCount = 1;

function sanitizeHTML(str) {
  const el = document.createElement('div');
  el.textContent = str;
  return el.innerHTML;
}

function addRow() {
  rowCount++;
  const tbody = document.getElementById('services-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td style="color:#9CA3AF;font-size:0.85rem;text-align:center">${tbody.children.length + 1}</td>
    <td><input type="text" placeholder="Service name..."></td>
    <td><input type="text" placeholder="Description..."></td>
    <td><input type="number" placeholder="0" style="text-align:right"></td>
    <td><button class="remove-row" onclick="removeRow(this)">✕</button></td>
  `;
  tbody.appendChild(tr);
  updateRowNumbers();
}

function removeRow(btn) {
  const tbody = document.getElementById('services-body');
  if (tbody.children.length <= 1) return;
  btn.closest('tr').remove();
  updateRowNumbers();
}

function updateRowNumbers() {
  const rows = document.querySelectorAll('#services-body tr');
  rows.forEach((r, i) => {
    r.querySelector('td:first-child').textContent = i + 1;
  });
}

function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn')[tab === 'form' ? 0 : 1].classList.add('active');
}

function formatPKR(n) {
  if (!n && n !== 0) return 'PKR 0';
  return 'PKR ' + Number(n).toLocaleString('en-PK');
}

function getStatusBadge(status) {
  if (status === 'paid') return '<span class="inv-badge badge-paid">✓ Paid</span>';
  if (status === 'unpaid') return '<span class="inv-badge badge-unpaid">⚠ Unpaid</span>';
  return '<span class="inv-badge badge-partial">◑ Partially Paid</span>';
}

function downloadPDF(event) {
  const element = document.getElementById('invoice-preview');
  const invNum = document.getElementById('inv_number').value || 'KQ-Invoice';
  const opt = {
    margin: [10, 10, 10, 10],
    filename: `${invNum}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, logging: false },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  const btn = event.target;
  btn.textContent = '⏳ Generating...';
  btn.disabled = true;
  html2pdf().set(opt).from(element).save().then(() => {
    btn.textContent = '⬇️ Download PDF';
    btn.disabled = false;
  });
}
